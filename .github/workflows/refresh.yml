name: OpenPhone Hourly Refresh

on:
  workflow_dispatch:        # Triggered by cron-job.org every 30 min

concurrency:
  group: openphone-refresh  # Only one run at a time
  cancel-in-progress: true  # Cancel old run if new one starts

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90     # Kill if takes longer than 90 min

    steps:
      - name: Fetch from OpenPhone API and update Gist
        env:
          OP_API_KEY: ${{ secrets.OP_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: eb3ce9edc8e58d0042a745c0e560b731
        run: |
          node << 'EOF'
          const https = require('https');

          const OP_KEY   = process.env.OP_API_KEY;
          const GH_TOKEN = process.env.GITHUB_TOKEN;
          const GIST_ID  = process.env.GIST_ID;
          const OP_BASE  = 'https://api.openphone.com/v1';

          // ── Helpers ──────────────────────────────────────────────────────
          function request(url, opts = {}) {
            return new Promise((resolve, reject) => {
              const req = https.request(url, opts, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => {
                  try { resolve({ status: res.statusCode, body: JSON.parse(data) }); }
                  catch(e) { resolve({ status: res.statusCode, body: data }); }
                });
              });
              // 30 second timeout per request — prevents hanging forever
              req.setTimeout(30000, () => {
                req.destroy(new Error('Request timeout after 30s'));
              });
              req.on('error', reject);
              if (opts.body) req.write(opts.body);
              req.end();
            });
          }

          async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

          async function opGet(path, retries = 4) {
            for (let attempt = 0; attempt <= retries; attempt++) {
              try {
                const r = await request(`${OP_BASE}${path}`, {
                  headers: { 'Authorization': OP_KEY }
                });
                if (r.status === 404) return { data: [], nextPageToken: null };
                if (r.status === 429) { // rate limited
                  await sleep(5000 * (attempt + 1));
                  continue;
                }
                if (r.status !== 200) throw new Error(`OpenPhone API ${r.status}: ${JSON.stringify(r.body)}`);
                return r.body;
              } catch(e) {
                if (attempt === retries) throw e;
                const wait = 3000 * (attempt + 1);
                console.log(`  Retry ${attempt + 1}/${retries} after ${wait}ms: ${e.message.slice(0,60)}`);
                await sleep(wait);
              }
            }
          }

          async function opGetAll(path) {
            const results = [];
            let nextPage = null;
            do {
              const sep = path.includes('?') ? '&' : '?';
              const url = nextPage ? `${path}${sep}maxResults=50&pageToken=${nextPage}` : `${path}?maxResults=50`;
              const res = await opGet(url);
              results.push(...(res.data || []));
              nextPage = res.nextPageToken || null;
            } while (nextPage);
            return results;
          }

          async function fetchGist() {
            const r = await request(`https://api.github.com/gists/${GIST_ID}`, {
              headers: { 'Authorization': `token ${GH_TOKEN}`, 'User-Agent': 'openphone-refresh', 'Accept': 'application/vnd.github.v3+json' }
            });
            if (r.status !== 200) return null;
            const raw = r.body.files?.['data.json']?.content;
            if (!raw || raw === '{}') return null;
            return JSON.parse(raw);
          }

          async function saveGist(data) {
            const body = JSON.stringify({ files: { 'data.json': { content: JSON.stringify(data) } } });
            const r = await request(`https://api.github.com/gists/${GIST_ID}`, {
              method: 'PATCH',
              headers: {
                'Authorization': `token ${GH_TOKEN}`,
                'User-Agent': 'openphone-refresh',
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(body)
              },
              body
            });
            if (r.status !== 200) throw new Error(`Gist save failed: ${r.status}`);
            console.log('Saved to Gist successfully');
          }

          function normNum(n) { return String(n).replace(/[^0-9]/g, ''); }

          // ── Main ─────────────────────────────────────────────────────────
          async function main() {
            console.log('Starting OpenPhone refresh...');

            // Load existing data
            const existing = await fetchGist();
            const pivotData = {};

            if (existing && existing.rows) {
              existing.rows.forEach(u => {
                pivotData[u.email] = { ...u, months: { ...u.months }, days: { ...(u.days||{}) } };
              });
              console.log(`Loaded ${existing.rows.length} users from Gist`);
            }

            // Determine fetch window — only since last refresh
            // Smart lookback:
            // - Good data (>=118 users) → incremental from last fetch
            // - Incomplete data → full history, but resume from last checkpoint if available
            // Good data = 100+ active users OR had good data before but Gist got corrupted
            const activeCount = existing && existing.rows ? existing.rows.length : 0;
            const archivedCount = existing && existing.archivedUsers ? existing.archivedUsers.length : 0;
            const hasGoodData = activeCount >= 100 || (activeCount + archivedCount) >= 100;
            const OVERLAP_MS = 20 * 60 * 1000;
            const lastFetch = existing && existing.fetchedAt ? new Date(existing.fetchedAt) : null;
            // Resume from checkpoint only during full history fetch
            const resumeFromIndex = (!hasGoodData && existing && existing._resumeIndex) ? existing._resumeIndex : 0;
            if (hasGoodData && existing && existing._resumeIndex) {
              console.log('Clearing stale resume index — switching to incremental mode');
            }
            const lookbackDate = hasGoodData && lastFetch
              ? new Date(lastFetch.getTime() - OVERLAP_MS)
              : new Date('2024-06-01T00:00:00Z');
            const createdAfter = lookbackDate.toISOString();
            if (hasGoodData) console.log(`Incremental fetch since ${createdAfter}`);
            else console.log(`Full history fetch — ${resumeFromIndex > 0 ? 'resuming from number ' + resumeFromIndex : 'starting fresh'}`);
            console.log(`Fetching calls since: ${createdAfter}`);

            // Fetch users and phone numbers
            const users = await opGetAll('/users');
            const userById = {};
            users.forEach(u => { userById[u.id] = { email: u.email, firstName: u.firstName, lastName: u.lastName }; });
            console.log(`${users.length} users`);

            const phoneNumbers = await opGetAll('/phone-numbers');
            const numById = {};
            phoneNumbers.forEach(pn => {
              (pn.users || []).forEach(pu => {
                const user = userById[pu.id];
                if (user && !numById[pn.id]) {
                  numById[pn.id] = { ...user, number: normNum(pn.number), userId: pu.id };
                }
              });
            });
            console.log(`${phoneNumbers.length} phone numbers, ${Object.keys(numById).length} mapped`);

            // Update existing user info with fresh data from API
            // Track number changes with timestamp
            const today = new Date().toISOString().slice(0, 10);

            // Build set of active emails from API
            const activeEmails = new Set(Object.values(numById).map(u => u.email));

            // Load existing archived users (preserve across runs)
            const archivedMap = {};
            if (existing && existing.archivedUsers) {
              existing.archivedUsers.forEach(u => { archivedMap[u.email] = u; });
            }

            // Move deleted users to archive instead of deleting
            const nowArchived = [];
            Object.keys(pivotData).forEach(email => {
              if (!activeEmails.has(email)) {
                const u = pivotData[email];
                if (!archivedMap[email]) {
                  // First time archiving this user
                  archivedMap[email] = { ...u, archivedAt: today };
                  nowArchived.push(email);
                }
                delete pivotData[email];
              }
            });
            if (nowArchived.length > 0) {
              console.log(`Archived ${nowArchived.length} removed user(s): ${nowArchived.join(', ')}`);
            }

            // Update info and track number changes for active users
            Object.values(numById).forEach(u => {
              if (pivotData[u.email]) {
                const existing = pivotData[u.email];
                const oldNum = String(existing.number || '').replace(/[^0-9]/g, '');
                const newNum = String(u.number || '').replace(/[^0-9]/g, '');
                if (oldNum && newNum && oldNum !== newNum) {
                  // Only log if not already recorded today (avoid re-detecting on every run)
                  const alreadyRecorded = existing.numberChangedAt === today;
                  if (!alreadyRecorded) {
                    console.log(`  Number change: ${u.email}: ${oldNum} → ${newNum}`);
                    existing.previousNumber  = oldNum;
                    existing.numberChangedAt = today;
                  }
                }
                existing.firstName = u.firstName;
                existing.lastName  = u.lastName;
                existing.number    = newNum;
              }
            });
            console.log('Updated user info from API');

            // Fetch calls — parallel batches of 5 numbers at a time
            const seen = new Set();
            const uniqueNumbers = phoneNumbers.filter(pn => {
              if (seen.has(pn.id) || !numById[pn.id]) return false;
              seen.add(pn.id); return true;
            });

            let totalFetched = 0;

            async function processNumber(pn) {
              const user = numById[pn.id];
              // Wrap entire number processing in a 3-minute timeout
              return new Promise(async (resolve, reject) => {
                const timer = setTimeout(() => {
                  console.log(`  TIMEOUT skipping ${user.email} after 3 min`);
                  resolve(); // skip this number, don't fail
                }, 3 * 60 * 1000);

                try {
                  // Get conversations for this number
                  let convPage = null;
                  const participantNums = new Set();
                  do {
                const p = new URLSearchParams({ phoneNumbers: pn.id, maxResults: 50 });
                if (createdAfter > '2024-06-02') p.set('updatedAfter', createdAfter);
                if (convPage) p.set('pageToken', convPage);
                const r = await opGet(`/conversations?${p}`);
                (r.data || []).forEach(c => (c.participants || []).forEach(pt => participantNums.add(pt)));
                convPage = r.nextPageToken || null;
              } while (convPage);

              // Fetch calls per participant in parallel batches of 3
              const parts = Array.from(participantNums);
              for (let pi = 0; pi < parts.length; pi += 3) {
                const pbatch = parts.slice(pi, pi + 3);
                await Promise.all(pbatch.map(async participant => {
                let callPage = null;
                do {
                  const p = new URLSearchParams({
                    phoneNumberId: pn.id, participants: participant,
                    maxResults: 100, createdAfter
                  });
                  if (callPage) p.set('pageToken', callPage);
                  const r = await opGet(`/calls?${p}`);
                  const calls = r.data || [];
                  callPage = r.nextPageToken || null;
                  calls.forEach(call => {
                    if (call.direction !== 'outgoing') return;
                    const date = new Date(call.createdAt);
                    if (isNaN(date)) return;
                    const mk = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
                    const dk = `${mk}-${String(date.getDate()).padStart(2,'0')}`;
                    if (!pivotData[user.email]) pivotData[user.email] = { ...user, months: {}, days: {} };
                    if (!pivotData[user.email].days) pivotData[user.email].days = {};
                    pivotData[user.email].months[mk] = (pivotData[user.email].months[mk] || 0) + 1;
                    pivotData[user.email].days[dk]   = (pivotData[user.email].days[dk]   || 0) + 1;
                    totalFetched++;
                  });
                } while (callPage);
                }));
              }
            }

            // Process sequentially — skip already-processed numbers if resuming
            for (let i = resumeFromIndex; i < uniqueNumbers.length; i++) {
              await processNumber(uniqueNumbers[i]);
              if ((i + 1) % 5 === 0) {
                console.log(`  ${i+1}/${uniqueNumbers.length} numbers, ${totalFetched} calls`);
              }
              // Save checkpoint every 10 numbers
              if ((i + 1) % 10 === 0) {
                const partialRows = Object.values(pivotData);
                partialRows.forEach(u => { u.total = Object.values(u.months).reduce((a,b)=>a+b,0); });
                const ms = new Set(); partialRows.forEach(u => Object.keys(u.months).forEach(m => ms.add(m)));
                const partialMonths = Array.from(ms).sort();
                const partialTotal = partialRows.reduce((s,u)=>s+u.total,0);
                const partialMax = partialRows.length ? Math.max(...partialRows.flatMap(u=>Object.values(u.months))) : 1;
                // Store resume index so next run continues from here if timeout occurs
                await saveGist({ rows: partialRows, allMonths: partialMonths, totalCalls: partialTotal, globalMax: partialMax, fetchedAt: new Date().toISOString(), generatedAt: 'Refreshing...', _resumeIndex: i + 1, archivedUsers: Object.values(archivedMap) });
                console.log(`  Checkpoint saved: ${partialTotal.toLocaleString()} calls, ${partialRows.length} users (resume index: ${i+1})`);
              }
              await sleep(200);
            }

            console.log(`Total new calls fetched: ${totalFetched}`);

            // Build and save payload
            const rows = Object.values(pivotData);
            rows.forEach(u => { u.total = Object.values(u.months).reduce((a,b)=>a+b,0); });
            const monthSet = new Set();
            rows.forEach(u => Object.keys(u.months).forEach(m => monthSet.add(m)));
            const allMonths = Array.from(monthSet).sort();
            const totalCalls = rows.reduce((s,u)=>s+u.total,0);
            const globalMax = rows.length ? Math.max(...rows.flatMap(u=>Object.values(u.months))) : 1;
            const fetchedAt = new Date().toISOString();
            const ist = new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Kolkata'}));
            const pad = n => String(n).padStart(2,'0');
            const generatedAt = ist.getDate() + ' ' + ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][ist.getMonth()] + ' ' + ist.getFullYear() + ', ' + pad(ist.getHours()) + ':' + pad(ist.getMinutes()) + ' IST';

            const archivedUsers = Object.values(archivedMap);
            // No _resumeIndex in final save — signals next run to use incremental mode
            await saveGist({ rows, allMonths, totalCalls, globalMax, fetchedAt, generatedAt, archivedUsers });
            console.log(`Done! ${totalCalls.toLocaleString()} total calls, ${rows.length} active users, ${archivedUsers.length} archived`);
          }

          main().catch(err => { console.error(err); process.exit(1); });
          EOF
